{% extends "base.html" %}
{% block title %}Upload Photos — {{ event.name }}{% endblock %}
{% block content %}
<h2>Upload Photos — {{ event.name }}</h2>
<form method="post" enctype="multipart/form-data"
      hx-post="{% url 'upload_photos' event.pk %}"
      hx-target="#photo-grid"
      hx-swap="innerHTML">
    {% csrf_token %}
    <div class="mb-3">
        <input type="file" name="photos" multiple accept="image/*" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-primary">Upload</button>
    <a href="{% url 'event_gallery' event.pk %}" class="btn btn-outline-secondary">Back to Gallery</a>
</form>
<hr>
<div id="photo-grid" class="row mt-3">
    {% include "gallery/partials/photo_grid.html" %}
</div>
{% endblock %}
