{% extends "base.html" %}
{% block title %}{% if event %}Edit{% else %}New{% endif %} Event — Jason Studio{% endblock %}
{% block content %}
<h2>{% if event %}Edit Event{% else %}New Event{% endif %}</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Save</button>
    <a href="{% url 'photographer_dashboard' %}" class="btn btn-outline-secondary">Cancel</a>
</form>
{% endblock %}
