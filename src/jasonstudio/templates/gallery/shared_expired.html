{% extends "base.html" %}
{% block title %}Link Expired{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card text-center">
            <div class="card-body py-5">
                <h3 class="mb-3"><i class="fa-solid fa-clock text-muted"></i></h3>
                <h4>This link is no longer available</h4>
                <p class="text-muted">The share link has expired or been deactivated.</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
