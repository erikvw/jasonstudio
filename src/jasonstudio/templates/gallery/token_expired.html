{% extends "base.html" %}
{% block title %}Link Expired{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center py-5">
        <h2>This Link Has Expired</h2>
        <p class="text-muted">
            This download link expired on {{ token.expires_at|date:"N j, Y" }}.
            Please contact the photographer for a new link.
        </p>
    </div>
</div>
{% endblock %}
